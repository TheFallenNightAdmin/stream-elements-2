  /* dim / unify the photo so UI elements and text stay legible */
  #bg-overlay{
    position:absolute; inset:0;
    background:
      linear-gradient(180deg, rgba(6,1,9,0.55) 0%, rgba(6,1,9,0.20) 22%, rgba(6,1,9,0.35) 60%, rgba(6,1,9,0.80) 100%),
      radial-gradient(ellipse 60% 45% at 50% 53%, rgba(6,1,9,0.55) 0%, rgba(6,1,9,0.15) 60%, rgba(6,1,9,0) 80%);
    pointer-events:none;
  }

  /* faint scanline texture, matches the camera-overlay page */
  #scan{
    position:absolute; inset:0;
    background:repeating-linear-gradient(180deg, rgba(255,255,255,0.025) 0px, rgba(255,255,255,0.025) 1px, transparent 1px, transparent 3px);
    mix-blend-mode:overlay;
    opacity:0.45;
    pointer-events:none;
  }

  /* ---------- outer engraved frame ---------- */
  .outer-frame{
    position:absolute;
    inset:2.2% 1.6%;
    border:1px solid var(--hair);
    z-index:3;
    pointer-events:none;
  }

  /* ---------- corner UI brackets ---------- */
  .stage-corner{
    position:absolute;
    width:46px; height:46px;
    z-index:6;
    opacity:0.75;
  }
  .stage-corner svg{ width:100%; height:100%; }
  .stage-corner.tl{ top:2.8%; left:2%; }
  .stage-corner.tr{ top:2.8%; right:2%; transform:scaleX(-1); }
  .stage-corner.bl{ bottom:2.8%; left:2%; transform:scaleY(-1); }
  .stage-corner.br{ bottom:2.8%; right:2%; transform:scale(-1,-1); }

  /* ---------- banner ---------- */
  .banner-wrap{
    position:absolute;
    top:2.6%;
    left:50%;
    transform:translateX(-50%);
    width:19%;
    text-align:center;
    z-index:5;
  }
  .banner-wrap img{
    width:100%;
    height:auto;
    display:block;
  }

  /* ---------- status panel (replaces the camera frame) ---------- */
  .status-panel{
    position:absolute;
    left:23%;
    top:36%;
    width:54%;
    height:34%;
    z-index:4;
    border-radius:8px;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .status-panel .border{
    position:absolute; inset:0;
    border-radius:8px;
    background:rgba(6,1,9,0.42);
    border:2px solid var(--purple-mid);
    box-shadow: inset 0 0 0 1px rgba(0,0,0,0.55);
  }
  .status-panel .border-inner{
    position:absolute; inset:7px;
    border-radius:5px;
    border:1px solid var(--hair);
  }
  .status-panel .bracket{
    position:absolute;
    width:24px; height:24px;
    border:2px solid var(--purple-bright);
    opacity:0.9;
  }
  .bracket.tl{ top:-10px; left:-10px; border-right:none; border-bottom:none; }
  .bracket.tr{ top:-10px; right:-10px; border-left:none; border-bottom:none; }
  .bracket.bl{ bottom:-10px; left:-10px; border-right:none; border-top:none; }
  .bracket.br{ bottom:-10px; right:-10px; border-left:none; border-top:none; }
  .status-panel .tick{
    position:absolute;
    width:5px; height:5px;
    background:var(--purple-bright);
  }
  .tick.tl{ top:-12px; left:18px; }
  .tick.tr{ top:-12px; right:18px; }
  .tick.bl{ bottom:-12px; left:18px; }
  .tick.br{ bottom:-12px; right:18px; }

  .status-content{
    position:relative;
    text-align:center;
    padding:0 6%;
  }
  .status-eyebrow{
    font-size:13px;
    letter-spacing:6px;
    color:var(--purple-bright);
    opacity:0.8;
    margin-bottom:1.4vh;
  }
  .status-eyebrow .dot{
    display:inline-block;
    width:7px; height:7px;
    border-radius:50%;
    background:var(--status);
    margin-right:9px;
    animation: blink 2.4s ease-in-out infinite;
  }
  .status-title{
    font-family:'Pirata One', serif;
    font-size:clamp(34px, 4.6vw, 76px);
    line-height:1.05;
    letter-spacing:2px;
    color:var(--purple-glow);
  }
  .status-sub{
    margin-top:1.8vh;
    font-size:14px;
    letter-spacing:4px;
    color:var(--purple-bright);
    opacity:0.78;
  }
  @keyframes blink{
    0%,100%{ opacity:1; }
    50%    { opacity:0.3; }
  }

  .status-tag{
    position:absolute;
    left:50%;
    bottom:-32px;
    transform:translateX(-50%);
    font-size:13px;
    letter-spacing:3px;
    color:var(--purple-bright);
    opacity:0.85;
    white-space:nowrap;
  }

  /* ---------- bottom bar ---------- */
  .bottom-bar{
    position:absolute;
    left:6%;
    right:6%;
    bottom:5%;
    display:flex;
    align-items:center;
    justify-content:space-between;
    z-index:6;
  }
  .bottom-bar .line{
    position:absolute;
    left:0; right:0; top:50%;
    height:1px;
    background:linear-gradient(90deg, transparent, var(--line) 20%, var(--line) 80%, transparent);
    z-index:-1;
  }
  .tag{
    background:rgba(6,1,9,0.55);
    padding:4px 12px;
    font-size:12px;
    letter-spacing:2px;
    color:var(--purple-glow);
    border:1px solid var(--line);
    border-radius:2px;
  }
  .tag.status{
    color:var(--status);
    border-color:rgba(217,70,239,0.40);
    display:flex;
    align-items:center;
    gap:7px;
  }
  .tag.status .dot{
    width:7px; height:7px;
    border-radius:50%;
    background:var(--status);
    animation: blink 2.4s ease-in-out infinite;
  }
  .crown-mini{
    position:absolute;
    left:50%; top:50%;
    transform:translate(-50%,-50%);
    width:20px; height:20px;
    opacity:0.75;
  }
</style>
</head>
